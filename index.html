<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>CGT | Portale Video Tecnologie</title>
    <meta
      name="description"
      content="Portale video CGT per consultare contenuti tecnici via QR code."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-overlay">
        <div class="container hero-content">
          <div class="brand-badge">CGT</div>
          <h1>Portale Video Tecnologie CGT-CAT</h1>
          <p>
            Di seguito video con istruzioni, tutorial e contenuti tecnici.
          </p>
        </div>
      </div>
    </header>

    <main class="container main-content">
      <section class="filters" aria-label="Filtri contenuti">
        <button class="filter-btn active" data-filter="tutti">Tutti</button>
        <button class="filter-btn" data-filter="video">Video</button>
        <button class="filter-btn" data-filter="short">Short</button>
      </section>

      <section id="video-player-section" class="video-player-section"></section>

      <section>
        <div id="video-list" class="video-list"></div>
      </section>
    </main>

    <script src="./videos.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
