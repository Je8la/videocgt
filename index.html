<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CGT | Portale Video Tecnologie</title>
    <meta
      name="description"
      content="Portale video CGT per consultare contenuti tecnici via QR code."
    />
    <meta name="author" content="Alejandro Febres Vilchez" />
    <meta
      name="application-name"
      content="Portale Video Tecnologie CGT-CAT"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      Progetto: Portale Video Tecnologie CGT-CAT
      Scopo: accesso rapido via QR code a video istruzioni, tutorial e contenuti tecnici.
      Proposta e sviluppo iniziale: Alejandro Febres Vilchez
      Contesto: progetto interno CGT pensato per fruizione mobile-friendly e gestione scalabile dei contenuti.
    -->

    <header class="hero">
      <div class="hero-overlay">
        <div class="container hero-content">
          <div class="brand-badge">CGT</div>
          <h1>Portale Video Tecnologie CGT-CAT</h1>
          <p>
            Di seguito video con istruzioni, tutorial e contenuti tecnici.
          </p>
        </div>
      </div>
    </header>

    <main class="container main-content">
      <section class="filters-panel" aria-label="Ricerca e filtri contenuti">
        <div class="search-wrap">
          <label for="search-input" class="sr-only">Cerca video</label>
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Cerca video, argomento o parola chiave..."
          />
        </div>

        <div class="select-wrap">
          <label for="tag-filter" class="sr-only">Filtra per categoria</label>
          <select id="tag-filter" class="tag-select">
            <option value="tutti">Seleziona categoria</option>
            <option value="CAT Grade 3D">CAT Grade 3D</option>
            <option value="Tutorial">Tutorial</option>
            <option value="Testimonianze">Testimonianze</option>
          </select>
        </div>
      </section>

      <section class="results-info-wrap">
        <div id="results-info" class="results-info"></div>
      </section>

      <section>
        <div id="video-list" class="video-list"></div>
      </section>

      <section class="pagination-wrap">
        <div id="pagination" class="pagination"></div>
      </section>
    </main>

    <script src="./videos.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
